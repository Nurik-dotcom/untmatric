name: Run Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Unit Tests (Godot 4.3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.3"
          include-mono: false

      - name: Repository Hygiene Checks
        shell: bash
        run: |
          set -euo pipefail
          cd $GITHUB_WORKSPACE
          python3 tools/ci/check_repo_hygiene.py

      - name: Resource Reference Checks
        shell: bash
        run: |
          set -euo pipefail
          cd $GITHUB_WORKSPACE
          python3 tools/ci/check_res_paths.py

      - name: Run Tests
        shell: bash
        run: |
          set -uo pipefail
          cd $GITHUB_WORKSPACE

          set +e
          godot --headless --path "$GITHUB_WORKSPACE" --scene res://tests/TestRunner.tscn 2>&1 | tee test-output.log
          RUN_EXIT=${PIPESTATUS[0]}
          set -e

          if grep -E -q "SCRIPT ERROR:|Parse Error:" test-output.log; then
            echo "[ERROR] Script or parse errors were found in test output."
            exit 1
          fi

          exit "${RUN_EXIT}"

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-godot-4.3
          path: test-output.log
          retention-days: 30
